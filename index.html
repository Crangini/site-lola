<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For my love 💖</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  overflow: hidden;
  font-family: "Georgia", serif;
  background: #f7e6e0;
}

/* ===== BACKGROUND HEARTS ===== */
.heart {
  position: absolute;
  color: rgba(255, 105, 180, 0.4);
  font-size: 18px;
  animation: floatUp 7s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* ===== SCREEN 1 ===== */
#startScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* envelope */
.envelope {
  width: 280px;
  height: 180px;
  background: #fff;
  position: relative;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  cursor: pointer;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 140px solid transparent;
  border-right: 140px solid transparent;
  border-bottom: 100px solid #ffd6e0;
}

/* text */
.openText {
  margin-top: 20px;
  color: #c97b9a;
  font-size: 16px;
}

/* ===== LETTER SCREEN ===== */
#letterScreen {
  display: none;
  height: 100vh;
  background: #f6e7dd;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* letter card */
.letterBox {
  width: 80%;
  max-width: 800px;
  height: 85vh;
  background: #f8f0e6;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  padding: 40px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
}

/* title */
.title {
  font-size: 34px;
  color: #ff6fa3;
  margin-bottom: 10px;
}

/* text */
.text {
  font-size: 16px;
  line-height: 1.6;
  color: #444;
  white-space: pre-line;
  padding: 10px 20px;
}

/* Ma Cherie button */
.maCherie {
  align-self: center;
  padding: 12px 25px;
  background: #ff6fa3;
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
}

/* go back */
.back {
  position: absolute;
  bottom: 15px;
  right: 15px;
  font-size: 14px;
  color: #c97b9a;
  cursor: pointer;
}

/* smooth transition */
.fade {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.98);}
  to {opacity: 1; transform: scale(1);}
}

</style>
</head>

<body>

<!-- 💖 BACKGROUND HEARTS -->
<script>
function hearts() {
  const h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 5) + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 8000);
}
setInterval(hearts, 250);
</script>

<!-- ===== SCREEN 1 ===== -->
<div id="startScreen">
  <div class="envelope" onclick="openLetter()"></div>
  <div class="openText">Click to open the letter</div>
</div>

<!-- ===== SCREEN 2 ===== -->
<div id="letterScreen" class="fade">

  <div class="letterBox">

    <div>
      <div class="title">For my love</div>

      <div class="text">
Mon Amour,

Since I met you, I can't stop thinking about you. I never thought I would find someone like you—a real sunshine, always smiling, laughing, and making jokes.

We've been together for 4 months, but it feels like 4 years.

I love you, Lola. ❤️
      </div>
    </div>

    <button class="maCherie">Ma Cherie</button>

  </div>

  <div class="back" onclick="goBack()">← Go back</div>

</div>

<script>
function openLetter() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("letterScreen").style.display = "flex";
}

function goBack() {
  document.getElementById("letterScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}
</script>

</body>
</html>
