<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Une lettre pour toi 💌</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f7e6e0, #fdecef);
    }

    /* 🎈 bulles cœur */
    .heart {
      position: absolute;
      color: rgba(255, 105, 180, 0.5);
      font-size: 20px;
      animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      30% { opacity: 1; }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* 💌 enveloppe */
    .envelope {
      width: 220px;
      height: 140px;
      background: #fff;
      position: relative;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .envelope:hover {
      transform: scale(1.05);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 70px solid #ffd6e0;
      transform-origin: top;
      transition: transform 0.6s;
    }

    .letter {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      padding: 20px;
      text-align: center;
      transition: opacity 0.6s;
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      opacity: 1;
    }

    /* 💌 message */
    .message {
      font-size: 18px;
      color: #444;
    }

  </style>
</head>

<body>

  <!-- 💖 bulles cœur générées -->
  <script>
    function createHearts() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (4 + Math.random() * 6) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createHearts, 300);
  </script>

  <!-- 💌 enveloppe -->
  <div class="envelope" onclick="openLetter(this)">
    <div class="flap"></div>
    <div class="letter">
      <div class="message">
        💌 Ceci est ton message par défaut 💌<br><br>
        Tu peux changer ce texte quand tu veux ❤️
      </div>
    </div>
  </div>

  <script>
    function openLetter(el) {
      el.classList.toggle("open");
    }
  </script>

</body>
</html>
